name: Deploy Frontend

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            # ── Repositório ──────────────────────────────
            if [ ! -d /data/alvenar/.git ]; then
              git clone https://github.com/TCC-LEDIJ/manutencaocondominio-front.git /data/alvenar
            fi
            cd /data/alvenar
            git pull origin main

            # ── Node via nvm ─────────────────────────────
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh" || { echo "nvm not found"; exit 1; }
            nvm use 24 || nvm install 24

            # ── Build ────────────────────────────────────
            npm ci
            npm run build

            # ── Deploy — pasta separada do fonte ─────────
            mkdir -p /data/alvenar-dist
            rsync -av --delete dist/ /data/alvenar-dist/